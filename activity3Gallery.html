<html>
<head>
    <title>Image Gallery</title>
    <style>
        h1 {
            margin-bottom: 20px;
            color: #333;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #FFFFFF;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 900px;
            margin-bottom: 30px;
        }

        .gallery img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .footer {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            cursor: pointer;
        }
    </style>
</head>
<body>
<h1>My Gallery</h1>
<div class="gallery">
    <img src="image1.jpg" alt="1">
    <img src="image2.jpg" alt="2">
    <img src="image3.jpg" alt="3">
    <img src="image4.jpg" alt="4">
    <img src="image5.jpg" alt="5">
    <img src="image6.jpg" alt="6">
    <img src="image7.jpg" alt="7">
    <img src="image8.jpg" alt="8">
    <img src="image9.jpg" alt="9">
    <img src="image10.jpg" alt="10">
</div>

<div class="footer">
    <a href="activity3.html">
        <button type="button">Back</button>
    </a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

            flex-direction: column;
            justify-content: center;
            align-items: center;

        select {

            font-size: 14px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        a {

        }

</head>
<body>

<h1>Home Page</h1>

<div class="container">
    <select name="sample" onchange="location = this.value;">
        <option value="#">Activities</option>
        <option value="activity1.html">Activity 1</option>

    <div class="links">

        <a href="activity3Gallery.html"><button type="button">Gallery</button></a>

</html>
